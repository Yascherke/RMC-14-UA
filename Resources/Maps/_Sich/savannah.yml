                 [head=2][color=#dfc189]Процедура підготовки логістики[/color][/head]

        [italic]Ця форма існує для покращення роботи Відділку Логістики у сфері забезпечення базових потреб 2 роти "Пікуючі Соколи", що розташована на ДКП-Саванна "Січ".[/italic]

        [color=#b18644]▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬[/color]

        [head=3]Основне[/head]

        Майте на увазі, що кожна операція - різна, проте ця процедура є більш менш універсальною для потреб нашої роти, будучи розробленою на підставі багатьох операцій. Відносьтеся до неї як настанови, а не правила.

        [color=#AAAAAA]──────────────────────────────────────────[/color]

        [head=3]Ящик для ПОБ[/head]

        [bullet]( [check] ) Принаймні одна коробка базових (не ББ) боєприпасів: Магазини М54С Мк2, М4СПР, М63.

        [bullet]( [check] ) Велика коробка для б/к дробовиків кожного типу (червона, зелена, фіолетова - дріб, кульові, та флешети відповідно).

        [bullet]( [check] ) Принаймні один набір ТМД-51.

        [bullet]( [check] ) Радіотелефонний рюкзак та палатка командування (друге у зброярні БІЦ, спитайте командувача операції).

        [bullet]( [check] ) Інженерний довідник.

        [bullet]( [check] ) Ліхтарі та фаєра, якщо морпіхи не зібрали.


        [italic]Якщо у вас просять обмежене обладнання - чудово, видавайте морпіхам. НЕ потрібно забирати у морпіхів оснащення та впихувати у ящик.[/italic]

        [color=#AAAAAA]──────────────────────────────────────────[/color]

        [head=3]Ящик дропу[/head]

        [bullet]( [check] ) ББ боєприпаси: М54С Мк2, М4СПР, М63. М54С та М4 мають калібр 10х24, тому можете видавати ящик з набоями (він дешевше). Необов'язково: базові магазини та кулі.

        [bullet]( [check] ) Велика коробка для б/к дробовиків кожного типу.

        [bullet]( [check] ) Боєприпаси для спеціалістів. Якщо спеціалісти не разом, розділяйте б/к у різні ящики.

        [bullet]( [check] ) Боєприпаси для ОСГ. Додатково: батареї ОСГ.

        [bullet]( [check] ) Ящики фаєрів. Візьміть ящики на південь від логістики, або у казармах (краще зробіть це завчасно, морпіхи люблять їх красти). Сигнальні фаєри також, якщо є пілот.

        [bullet]( [check] ) Великий ящик б/к для ТМД-51, чорний.

        [bullet]( [check] ) Спитати, чи є у морпіхів СП-6, ТМГ-88 чи інша рідка зброя, і завантажити відповідний б/к.


        [italic]Не забувайте, що морпіхи будуть у вас питати про додаткове спорядження підчас операції. Уважно слухайте чого вони просять, та оперативно вантажте. Повідомляйте командування про стан ящиків дропу.[/italic]

        [color=#b18644]▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬[/color]
