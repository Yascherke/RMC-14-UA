- type: job
  parent: RMCCLFSoldier
  id: SichCLFSoldier
  startingGear: SichGearCLFSoldier
  spawnMenuRoleName: ФВК Солдат
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillFirearms: 1
        RMCSkillFireman: 1
        RMCSkillMeleeWeapons: 1
        RMCSkillPolice: 1
        RMCSkillEndurance: 1
        RMCSkillJtac: 1
        RMCSkillVehicles: 1
        RMCSkillConstruction: 1
        RMCSkillEngineer: 1
        RMCSkillMedical: 1
  hidden: true

- type: entity
  id: SichRandomHumanoidCLFSoldier
  name: ФВК спавнер ролі привидів Солдата
  suffix: Spawner, Player
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/Armbands/clf_armband.rsi
    state: icon
  - type: RandomHumanoidSpawner
    settings: SichCLFSoldier

- type: randomHumanoidSettings
  parent: RMCEventHumanoid
  id: SichCLFSoldier
  components:
  - type: GhostRole
    name: rmc-ghost-role-clf-soldier
    description: rmc-ghost-role-information-clf-description
    rules: rmc-ghost-role-information-clf-rules
    reregister: false
    job: SichCLFSoldier
    raffle:
      settings: short
    requirements:
    - !type:RoleTimeRequirement
      role: CMJobRifleman
      time: 36000 # 10 Hours
  - type: GhostRoleApplySpecial
    squad: SquadCLF

- type: startingGear
  id: SichGearCLFSoldier
  equipment:
    head: RMCHeadMilitiaHood
    mask: RMCCombatUtilityKnifeA
    ears: RMCHeadsetDistressCLF
    jumpsuit: RMCJumpsuitCLFWebbing
    outerClothing: SichCoatMilitia
    gloves: CMHandsBlackMarine
    shoes: RMCShoesBrown
    id: RMCIDCardCLFSoldier
    belt: RMCM276ShotgunShellLoadingRigFill # TODO RMC14
    back: RMCWeaponShotgunHG3712
    pocket1: RMCFlashlight
    pocket2: RMCPouchFirstAidERTFill
  inhand:
  - WeaponRifleMAR40
  storage:
    outerClothing:
    - RMCBinocularsCiv
    - CMCrowbar
    - RMCGrenadeMolotov
