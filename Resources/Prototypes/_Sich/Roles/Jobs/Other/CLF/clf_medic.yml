  startingGear: SichGearCLFMedic
  spawnMenuRoleName: ФВК Медик
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillFirearms: 1
        RMCSkillFireman: 1
        RMCSkillMeleeWeapons: 1
        RMCSkillPolice: 1
        RMCSkillEndurance: 1
        RMCSkillJtac: 1
        RMCSkillVehicles: 1
        RMCSkillConstruction: 1
        RMCSkillEngineer: 1

        RMCSkillMedical: 2
        RMCSkillSurgery: 2
