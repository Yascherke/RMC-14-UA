# Поки тут лише мапа під "режим" з ФВК. Автоматичні анонси вимкнені, повідомлення тут для зручності адміністрації.
- type: entity
  parent: RMCPlanetVaradero
  id: SichPlanetVaraderoCLF
  components:
  - type: RMCPlanetMapPrototype
    inRotation: false
    map: /Maps/_Sich/Planets/varadero.yml
    announcement: "З аванпосту об'єднаних націй Нью-Варадеро, планета ЖЗ-908 (Тіамат-ІІІ) було надіслано автоматичний сигнал лиха через інфільтрацію сил Фронта Визволення Колоній та невдачі місцевих сил охорони та підрозділів з придушення бунтів БКМ в спробах захистити наш актив.
      \n
      \nСпеціалізація: санаторій КМПОН, острівна наукова станція та гірничодобувний комплекс;
      \nНаселення: 47 осіб;
      \nТемпература: всередині 20°С, ззовні 36°С;
      \nКерівник: мол. пред. ОН Стів Гайфіш;
      \nТелекомунікації: потребують ремонту.
      \n
      \nНаразі це вся доступна інформація.
      \n
      \nРекомендується підготовка до антипартизанської операції з активним використанням засобів вогневої підтримки. Засоби Орбітального Бомбардування було вилучено через людський фактор загрози та малий шанс її розповсюдження."

## Повідомлення про обвали печер від АРЕСу:
## "Реєструються наслідки сейсмічної нестабільністі в регіоні. За даними сканування більшість печерних зон колонії було завалено чи знищено.
## \nМапа території частково втратила актуальність, оновлення наразі неможливо. Рекомендація бути обачними та провести додаткову розвідку місцевості."
