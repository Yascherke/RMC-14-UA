          [head=3]ОСДМСТ - Особиста Система Десантування Морпіха Стільцевого Типу.[/head]

          [bold]Після багаточисленних звертань від офіцерського складу САМЕ ВАШОГО судна та в співпраці з цим самим офіцерським складом ми готові вам представити річ, яка 100% буде корисна під час операцій!
          Дозволяє висаджувати морпіха так само легко, як ви скидаєте ящик та в всі ті ж місця, куди ви кидали ті ящики![/bold]
          [italic]В комплекті також повинні йти маска для дихання, балон для дихання та скафандр. Дуже рекомендується одягти їх на особу, яка буде використовувати ОСДМСТ.[/italic]



          [color=#E41B1B][/italic] [head=2]УВАГА:[/head][italic]
          [bold]ЦЕ ЕКСПЕРИМЕНТАЛЬНА МОДЕЛЬ, СТАБІЛЬНІСТЬ, БЕЗПЕКА ТА НАДІЙНІСТЬ НЕ ГАРАНТУЮТЬСЯ.
          [head=3] Також дуже НЕ рекомендується:[/head]
          * Перевищувати норму навантаження на ОСДМСТ в 75 кілограмів, а також створювати сильні короткочасні навантаження (стрибати на ньому)
          * Використовувати ОСДМСТ більше ніж одній особі одночасно.
          * Використовувати ОСДМСТ не за призначенням.
          * При пошкодженні будь-яких частин ОСДМСТ продовжувати його використання.
          * Використовувати ОСДМСТ більше трьох разів без заміни основних компонентів.
          * Використовувати ОСДМСТ особам, які не мають рівня підготовки необхідного для суборбітальних польотів та відповідних їм навантажень.
          * Називати ОСДМСТ просто "стільцем", бо це неповага до стільців.
          [/bold][/color]

          [head=3]ВІДДІЛ РОЗРОБКИ ТА КМПОН РАЗОМ З УСІМА ДОЧІРНІМИ ТА ПРИЧЕТНИМИ ОРГАНІЗАЦІЯМИ НЕ НЕСУТЬ ВІДПОВІДАЛЬНІСТЬ ЗА ТРАВМИ
          ОТРИМАНІ ПРИ ВИКОРИСТАННІ ОСДМСТ.[/head]
