# Дуплікати Варадерських інсертів для мапи під ФВК
- type: entity
  abstract: true
  parent: RMCMapInsertBase
  id: SMCMapInsertVaraderoBase
  suffix: Інсерт Варадеро
  components:
  - type: MapInsert
    clearEntities: true
    clearDecals: true
    replaceAreas: true

- type: entity
  parent: SMCMapInsertVaraderoBase
  id: SMCMapInsertVaraderoCLFRaid
  name: Вторгнення ФВК
  components:
  - type: MapInsert
    variations:
    - spawn: "/Maps/_Sich/Inserts/Varadero/clf_raid.yml"
      probability: 1

- type: entity
  parent: SMCMapInsertVaraderoBase
  id: SMCMapInsertVaraderoResturant
  name: Ресторан
  components:
  - type: MapInsert
    variations:
    - spawn: "/Maps/_Sich/Inserts/Varadero/varadero_resturant.yml"
      probability: 0

- type: entity
  parent: SMCMapInsertVaraderoBase
  id: SMCMapInsertVaraderoAltHospital
  name: Альтернативний Мед
  components:
  - type: MapInsert
    clearEntities: true
    clearDecals: true
    replaceAreas: false
    variations:
    - spawn: "/Maps/_Sich/Inserts/Varadero/varadero_alt_hospital.yml"
      probability: 1

- type: entity
  parent: SMCMapInsertVaraderoBase
  id: SMCMapInsertVaraderoEngiHold
  name: Холд Інжу
  components:
  - type: MapInsert
    clearEntities: true
    clearDecals: true
    replaceAreas: false
    variations:
    - spawn: "/Maps/_Sich/Inserts/Varadero/engi_hold.yml"
      probability: 1
