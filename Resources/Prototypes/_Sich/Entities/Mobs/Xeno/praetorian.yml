## Повернення старого стрейну проеторіанця, Наглядача (Валькірія 0.5)!
- type: entity
  parent: CMXenoPraetorianBase
  id: SichXenoPraetorianWarden
  description: Велика й небезпечна чужопланетна істота, у якої на шиї велика кислотна почка та при цьому характерний синій гребінь й потужний хвіст.
  suffix: Наглядач, Січ
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Praetorian/warden_praetorian.rsi
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoAcidNormal
    - ActionXenoPheromones
    - ActionXenoSpit
    - ActionXenoSprayAcidWarden
    - ActionXenoAidHeal
    - ActionXenoAidRejuvenate
    - ActionXenoRetrieve
    - ActionXenoDevolve
  - type: XenoStrain
    name: sich-xeno-warden-name
    description: sich-xeno-warden-description
    popup: sich-xeno-warden-popup
  - type: XenoPheromones
    pheromonesMultiplier: 3
  - type: XenoSpit
    projectileId: XenoSpitProjectilePraetorianWarden
  - type: XenoEnergy
    alert: XenoEnergyValkyrie # XenoEnergyWarden так то, але версія Валькірії просто замінила Варденовську
    popupGain: rmc-xeno-internal-health-increase-user
    popupNotEnough: rmc-xeno-not-enough-internal-health
  - type: XenoRetrieve
  - type: XenoAid
    componentsRemove:
    - type: RMCSlowdown
    - type: RMCSuperSlowdown
    - type: RMCRooted
  - type: XenoSprayAcid
    acid: XenoAcidSprayStrong
    plasmaCost: 130
    barricadeDamage:
      types:
        Heat: 5
    doAfter: 0.5
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 30
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 36
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.2
    baseSprintSpeed: 3.5
  - type: SlowOnPull
    slowdowns:
    - multiplier: 0.64
      whitelist:
        components:
        - Marine
    - multiplier: 0.7025
      whitelist:
        components:
        - XenoLight
    - multiplier: 0.475
      whitelist:
        components:
        - XenoHeavy
  - type: XenoHidden
  - type: AcidTrap
  - type: RMCActionOrder
    id: SichXenoPraetorianWarden

