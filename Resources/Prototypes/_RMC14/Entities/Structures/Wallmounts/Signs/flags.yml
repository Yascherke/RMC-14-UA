  parent: RMCBannerCLFWorn # Sich
  id: RMCBannerTSEWorn
  name: подертий прапор ІТС
  description: "Сильно подертий та пошкоджений прапор Імперії Трьох Сонць (TSE), схоже він комусь не сподобався... Родина Вестон-Ямада. Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Дві монархії й наближені до них країни об'єдналися, утворивши потужну міжгалактичну силу. Їх символіка – це свастика, яка символізує об'єднання Британії, Японії, Індії, Австралії, Індонезії та ще деяких держав\", – слова вашої Вчительки Історії, якщо ви все ще пам'ятаєте, що вона там казала." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: tseflag_worn

- type: entity
  parent: RMCBannerBase
  id: RMCBannerUN
  name: прапор ОН
  description: "Прапор Об'єднаних Націй (UN). Країна, за яку ви ймовірно воюєте прямо зараз. Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Темно-синє полотно – немов безкрайні простори космосу. По центру велика чотирикутна зірка, а навколо неї 13 менших шестикутних розташованих вздовж дуги – неначе Сонячна та інші 13 систем. Знизу цього всього шифр – UN абеткою морзе\", – це Вчитель Географії вас змусив ледь не завчити на пам'ять." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: unflag

- type: entity
  parent: RMCBannerCLFWorn # Sich
  id: RMCBannerUNWorn
  name: подертий прапор ОН
  description: "Сильно подертий та пошкоджений прапор Об'єднаних Націй (UN), схоже він комусь не сподобався... Країна, за яку ви ймовірно воюєте прямо зараз. Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Темно-синє полотно – немов безкрайні простори космосу. По центру велика чотирикутна зірка, а навколо неї 13 менших шестикутних розташованих вздовж дуги – неначе Сонячна та інші 13 систем. Знизу цього всього шифр – UN абеткою морзе\", – це Вчитель Географії вас змусив ледь не завчити на пам'ять." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: unflag_worn

# Other
- type: entity
  parent: RMCBannerBase
  id: RMCBannerWEYA
  name: прапор Ве-Я
  description: "Прапор Вестон-Ямада (We-Ya). Всім відома мега-корпорація! Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Вестон та Ямада – дві великі корпорації, які об'єдналися заради забезпечення сталого розвитку всієї галактики. Майбутнє зараз\", – наче щось таке писалося у тій брошурі, яку давав вам Корпорат." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: weyaflag

- type: entity
  parent: RMCBannerBase
  id: RMCBannerTSEAlt
  name: старий прапор ІТС
  description: "Стара версія прапора Імперії Трьох Сонць (TSE). Він використовувався багато років тому, але дехто все ще любить його. Все ще родина Вестон-Ямада! Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Три полоси – 3 частини Імперії. За ідеєю схоже на сучасний прапор ІТС, але простіше\", – щось таке вам підказала Базова Логіка." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: tseflag_alt
