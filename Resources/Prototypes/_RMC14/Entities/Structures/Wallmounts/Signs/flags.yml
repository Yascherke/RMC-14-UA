- type: entity
  parent: BaseFlag
  id: RMCBannerBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Wallmounts/banners.rsi
  - type: Destructible # Sich. Бо чому ні?
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_RMC14/Effects/laser_cannon.ogg # Схоже ж
          params:
            volume: -5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: RMCBannerBase
  id: RMCBannerCLF
  name: прапор ФВК
  description: "Прапор Фронту Визволення Колоній (CLF). Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Анархісти, що з них взяти? Але це одна з останніх версій. Сіре полотно на якому 3 зірки – щось як пародія на ІТС, а ті палички та точки – CLF азбукою морзе. Збірник фішок інших прапорів\", – слова вашого Інструктора про символіку СПН відразу згадуються." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: clfflag

- type: entity
  parent: RMCBannerCLF
  id: RMCBannerCLFAltDraw
  suffix: Over Podlocks
  components:
  - type: Sprite
    state: clfflag
    drawdepth: BlastDoors

- type: entity
  parent: RMCBannerBase
  id: RMCBannerCLFWorn
  name: подертий прапор ФВК
  description: "Сильно подертий та пошкоджений прапор Фронту Визволення Колоній (CLF), схоже він комусь не сподобався... Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Анархісти, що з них взяти? Але це одна з останніх версій. Сіре полотно на якому 3 зірки – щось як пародія на ІТС, а ті палички та точки – CLF азбукою морзе. Збірник фішок інших прапорів\", – слова вашого Інструктора про символіку СПН відразу згадуються." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: clfflag_worn
  - type: Destructible # Sich. Далі буде як перент всім іншим подертим
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_RMC14/Effects/laser_cannon.ogg
          params:
            volume: -5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: RMCBannerBase
  id: RMCBannerCM
  name: прапор КМПОН
  description: "Прапор Корпусу Морської Піхоти Об'єднаних Націй (UNMC). Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Зелене полотно – немов планета Земля. По центру емблема, в її верхній частині зірка з крилами – Сонце та авіація, під ними коло, яке символізує планету-ціль, позаду неї проходить стріла – флот, а з краю видніється шифр – UNMC морзянкою\", – було як мантра, коли ви ще проходили БЗВП. ВІДДАТИ ЧЕСТЬ ПРАПОРУ!!!" # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: unmcflag

- type: entity
  parent: RMCBannerCLFWorn # Sich
  id: RMCBannerCMWorn
  name: подертий прапор КМПОН
  description: "Сильно подертий та пошкоджений прапор Корпусу Морської Піхоти Об'єднаних Націй (UNMC), схоже він комусь не сподобався... Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Зелене полотно – немов планета Земля. По центру емблема, в її верхній частині зірка з крилами – Сонце та авіація, під ними коло, яке символізує планету-ціль, позаду неї проходить стріла – флот, а з краю видніється шифр – UNMC морзянкою\", – було як мантра, коли ви ще проходили БЗВП. ВІДДАТИ ЧЕСТЬ ПРАПОРУ!!!" # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: unmcflag_worn

- type: entity
  parent: RMCBannerBase
  id: RMCBannerSPP
  name: прапор СПН
  description: "Прапор Соціалістичних Прогресивних Народів (SPP). Може викликати тільки огиду. Це ж бісові росіянські комуняки!
    \n\"Що могли придумати комуністи? Та як завжди – комуністичне лайно. Зірка, шматок шестерні та колоски на криваво-червоному тлі. Бачиш таке – до біса спали\", – слова одного старого Майора спливають у вашій голові." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: sppflag

- type: entity
  parent: RMCBannerCLFWorn # Sich
  id: RMCBannerSPPWorn
  name: подертий прапор СПН
  description: "Сильно подертий та пошкоджений прапор Соціалістичних Прогресивних Народів (SPP). Хтось не завершив справу до кінця. Може викликати тільки огиду. Це ж бісові росіянські комуняки!
    \n\"Що могли придумати комуністи? Та як завжди – комуністичне лайно. Зірка, шматок шестерні та колоски на криваво-червоному тлі. Бачиш таке – до біса спали\", – слова одного старого Майора спливають у вашій голові." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: sppflag_worn

- type: entity
  parent: RMCBannerBase
  id: RMCBannerTSE
  name: прапор ІТС
  description: "Прапор Імперії Трьох Сонць (TSE). Родина Вестон-Ямада. Викликає патріотизм, страх або огиду залежно від ваших політичних уподобань.
    \n\"Дві монархії й наближені до них країни об'єдналися, утворивши потужну міжгалактичну силу. Їх символіка – це свастика, яка символізує об'єднання Британії, Японії, Індії, Австралії, Індонезії та ще деяких держав\", – слова вашої Вчительки Історії, якщо ви все ще пам'ятаєте, що вона там казала." # Sich. Опис сильно розширено
  components:
  - type: Sprite
    state: tseflag

