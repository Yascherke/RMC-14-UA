- type: entity
  parent: RMCWeaponFlamer
  id: RMCWeaponFL3Flamer
  name: Фламменверфер-3 важка вогнеметна установка
  description: Важка вогнеметна установка з німецьким корінням, яку спочатку виробляла корпорація Вестон, а пізніше й Вестон-Ямада. Часто зустрічається під час місій з очищення "листя" на прикордонних колоніях, зазвичай не зустрічається в бою, але є руйнівною при реальному використанні.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_inhands.rsi
    layers:
    - state: base
      sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_icon.rsi
    - state: mag-0
      sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_icon.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
    - state: strip
      sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_icon.rsi
      color: "#DD9B00"
      map: ["enum.RMCFlamerVisualLayers.Strip"]
    - state: lit
      sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_icon.rsi
      map: ["enum.RMCIgniterVisuals.Ignited"]
  - type: Item
    sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_inhands.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Flamethrower/FL3/fl3_inhands.rsi
    slots:
    - suitStorage
    - Back
    - Belt
  - type: Gun
    soundGunshot:
      collection: RMCFlamerFL3Shoot
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Tank
        startingItem: RMCTankFlamerFL3
        insertSound: /Audio/_RMC14/Weapons/Guns/Flamer/wy_flamer_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Flamer/wy_flamer_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCTankFlamerFL3
  - type: RMCIgniter
    sound:
      path: /Audio/_RMC14/Weapons/Guns/Flamer/wy_flamer_ignite.ogg
  - type: AttachableHolder
    slots: {}
  - type: Tag
    tags:
    - RMCWeaponIncineratorFL3

- type: entity
  parent: RMCWeaponFL3Flamer
  id: RMCWeaponFL3FlamerPVE
  suffix: PVE
  components:
  - type: RMCMagneticItem
  - type: Gun
    fireRate: 2

- type: entity
  parent: RMCWeaponFL3Flamer
  id: RMCWeaponFL3FlamerWhiteout
  suffix: Whiteout
  components:
  - type: RMCMagneticItem
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Tank
        startingItem: RMCTankFlamerFL3Whiteout
        insertSound: /Audio/_RMC14/Weapons/Guns/Flamer/wy_flamer_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Flamer/wy_flamer_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCTankFlamerFL3

- type: entity
  parent: RMCTankFlamer
  id: RMCTankFlamerFL3
  name: ФВ3 великий бак з паливом
  description: Важкий резервуар великої місткості, що використовується вогнеметною установкою Фламменверфер-3. На нього нанесений синій термостійкий логотип Вестон-Ямада.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/fl3.rsi
    state: flametank
    layers:
    - state: flametank
    - state: flametank_strip1
    - state: flametank_strip2
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: RMCFlamerTank
    maxIntensity: 70
    maxRange: 8
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 300
        reagents:
        - ReagentId: RMCNapalmUT
          Quantity: 300
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: flametank_strip
  - type: Tag
    tags:
    - RMCTankFlamerFL3

- type: entity
  parent: RMCTankFlamerFL3
  id: RMCTankFlamerFL3Whiteout
  name: ФВ3 великий бак з паливом (ЕІкс)
  description: Важкий резервуар великої місткості з особливим напалмом ЕІкс, який здатен пропалювати майже будь-який захист від вогню за лічені секунди. Використовується вогнеметною установкою Фламменверфер-3. На нього нанесений синій термостійкий логотип Вестон-Ямада. Використовуйте та зберігайте з обережністю.
  components:
  - type: SolutionContainerManager
    solutions:
      rmc_flamer_tank:
        maxVol: 300
        reagents:
        - ReagentId: RMCNapalmEX
          Quantity: 300

- type: Tag
  id: RMCWeaponIncineratorFL3

- type: Tag
  id: RMCTankFlamerFL3
