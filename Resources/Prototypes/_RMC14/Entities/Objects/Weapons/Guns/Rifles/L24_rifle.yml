- type: entity
  parent: [ CMBaseWeaponRifle, RMCBaseWeaponMagazineVisuals ]
  id: RMCWeaponRifleL24
  name: Л24 гвинтівка
  description: Рідкісний екземпляр, який зазвичай можна побачити в Королівської Морпіхоти ІТС. В порівнянні з М54С МК2 має легшу конструкцію та покращену точність, хоча й по надійності він програє.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/L24/inhand.rsi
    layers:
    - state: base
      sprite: _RMC14/Objects/Weapons/Guns/Rifles/L24/L24_Icon.rsi
    - state: bolt-open
      sprite: _RMC14/Objects/Weapons/Guns/Rifles/L24/L24_Icon.rsi
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      sprite: _RMC14/Objects/Weapons/Guns/Rifles/L24/L24_Icon.rsi
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Rifles/L24/inhand.rsi
  - type: Gun
    shotsPerBurst: 3
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      collection: RMCSSG45Shoot
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 3.4
    recoilUnwielded: 4
    scatterWielded: 2
    scatterUnwielded: 20
    baseFireRate: 2.75
    burstScatterMult: 1
    modifiers:
      Burst:
        fireDelay: 0.225
        maxScatterModifier: 6
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        fireDelay: 0
        maxScatterModifier: 6
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 4
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.5
    accuracyMultiplierUnwielded: 0.75
  - type: MagazineAmmoProvider
    autoEject: false
    soundAutoEject: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineRifleL24
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineRifleL24
          - RMCMagazineRifleL24AP
          - RMCMagazineRifleL24Extended
          - RMCMagazineRifleL24HEAP
          - RMCMagazineRifleL24Incendiary
  - type: GunDamageModifier
    multiplier: 1.0
  - type: AttachableHolder
    randomAttachmentChance: 1
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCM5Bayonet
        random:
        - RMCAttachmentSuppressor
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS84xTelescopicScope
          - RMCAttachmentS42xTelescopicMiniscope
        random:
        - RMCAttachmentS6ReflexSight
        - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-stock:
        locked: true
        startingAttachable: RMCAttachmentL24Stock
        whitelist:
          tags:
          - RMCAttachmentL24Stock
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentAngledGrip
          - RMCAttachmentBipod
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentLaserSight
          - RMCAttachmentVerticalGrip
          - RMCAttachmentExtinguisher
          - RMCAttachmentFlamer
          - RMCAttachmentU7UnderbarrelShotgun
          - RMCAttachmentU1GrenadeLauncher
        random:
        - RMCAttachmentU7UnderbarrelShotgun
        - RMCAttachmentMiniFlamethrower
        - RMCAttachmentU1GrenadeLauncher
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.906, 0.03125
      rmc-aslot-rail: -0.0175, 0.19
      rmc-aslot-stock: -0.5, 0.01
      rmc-aslot-underbarrel: 0.3125, -0.315

