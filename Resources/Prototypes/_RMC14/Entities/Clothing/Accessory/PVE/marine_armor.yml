# Neck Guard
- type: entity
  parent: RMCPVEArmorNeckGuardBase
  id: RMCPVEArmorNeckGuard
  name: горжет М3
  description: Додаткова броня, що прикріплюється до броні М3. Проста полимерна плита, що захищає шию від куль та шрапнелі.
