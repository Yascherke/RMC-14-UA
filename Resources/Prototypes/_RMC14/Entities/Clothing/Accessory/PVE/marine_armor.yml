# Groin Plate
- type: entity
  parent: RMCPVEArmorGroinPlateBase
  id: RMCPVEArmorGroinPlate
  name: плита на живіт М3
  description: Додаткова броня, що прикріплюється до броні М3. Рідка броня з потовщенням від зсуву, що покриває живіт і пах, з додатковим посиленим карбідом бору. Застібки кріпляться до внутрішньої сторони броні М3.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/Marine/groinplate/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Accessory/PVE/Marine/groinplate/jungle.rsi
      Desert: _RMC14/Objects/Clothing/Accessory/PVE/Marine/groinplate/desert.rsi
      Classic: _RMC14/Objects/Clothing/Accessory/PVE/Marine/groinplate/classic.rsi
      Snow: _RMC14/Objects/Clothing/Accessory/PVE/Marine/groinplate/snow.rsi
      Urban: _RMC14/Objects/Clothing/Accessory/PVE/Marine/groinplate/urban.rsi

# Shin Guard
- type: entity
  parent: RMCPVEArmorShinGuardBase
  id: RMCPVEArmorShinGuard
  name: наголінники М3
  description: Додаткова броня, що прикріплюється до броні М3. Легкі полімерні пластини у формі черепахи, що закривають нижню частину ніг та забезпечуючи захист від осколків і пістолетних куль.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/Marine/shinguards/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Accessory/PVE/Marine/shinguards/jungle.rsi
      Desert: _RMC14/Objects/Clothing/Accessory/PVE/Marine/shinguards/desert.rsi
      Classic: _RMC14/Objects/Clothing/Accessory/PVE/Marine/shinguards/classic.rsi
      Snow: _RMC14/Objects/Clothing/Accessory/PVE/Marine/shinguards/snow.rsi
      Urban: _RMC14/Objects/Clothing/Accessory/PVE/Marine/shinguards/urban.rsi

# Knee Guard
- type: entity
  parent: RMCPVEArmorKneeGuardBase
  id: RMCPVEArmorKneeGuard
  name: наколінники М3
  description: Додаткова броня, що прикріплюється до броні М3. Має ударостійку міцну зовнішню оболонка та полімерні внутрішні елементи, якізахищають від осколків, а також від ударів малої сили.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/Marine/thighguards/jungle.rsi
  - type: ItemCamouflage
