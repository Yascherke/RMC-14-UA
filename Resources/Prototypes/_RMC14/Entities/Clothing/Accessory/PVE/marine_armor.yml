# Pads
- type: entity
  parent: RMCPVEArmorPadsBase
  id: RMCPVEArmorPads
  name: наплічники М3
  description: Додаткова броня, що прикріплюється до броні М3. Захищає від прямих влучань та закриває отвори для рук в броні від шрапнелі.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/PVE/Marine/pads/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Accessory/PVE/Marine/pads/jungle.rsi
      Desert: _RMC14/Objects/Clothing/Accessory/PVE/Marine/pads/desert.rsi
      Classic: _RMC14/Objects/Clothing/Accessory/PVE/Marine/pads/classic.rsi
      Snow: _RMC14/Objects/Clothing/Accessory/PVE/Marine/pads/snow.rsi
      Urban: _RMC14/Objects/Clothing/Accessory/PVE/Marine/pads/urban.rsi

