  name: одяг науковця
  description: Простий набір цивільного одягу, який носять науковці.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/research.rsi

- type: entity
  parent: RMCMarineUniformBase
  id: CMJumpsuitRD
  name: уніформа голови досліджень
  description: Вона зроблена із спеціального матеріалу, що забезпечує малий захист проти біологічних загроз. Уніформа має позначки, що окреслюють носія як Голову Досліджень.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/research_director.rsi

