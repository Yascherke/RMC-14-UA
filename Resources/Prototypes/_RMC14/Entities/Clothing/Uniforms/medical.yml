# CMO
- type: entity
  parent: RMCMarineUniformBase
  id: CMJumpsuitCMO
  name: комбінезон головного лікаря
  description: Це комбінезон, який носять ті, хто мав честь бути Головний Лікарем. Він забезпечує малий біологічний захист.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/cmo.rsi

# Research
- type: entity
  parent: RMCMarineUniformBase
