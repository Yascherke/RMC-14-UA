- type: entity
  parent: RMCMarineUniformBase
  id: CMJumpsuitProvostAgent
  name: уніформа спеціального агента
  description: Модифікована уніфорам Провосту, у якої стандартні знаки розрізнення було замінено на Служби Розвідки. Спеціальних агентів часто набирають із вищих ешелонів правоохоронних органів у різних збройних силах. Ці рекрути зазвичай беруть усе своє спорядження, включно з формою, і пізніше модифікують його, додаючи емблеми розвідувальних служб.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/Provost/agent.rsi
  - type: Tag
    tags:
    - RMCUniformMarine
    - RMCUniformMP
    - RMCUniformWarden
    - RMCUniformCMP
