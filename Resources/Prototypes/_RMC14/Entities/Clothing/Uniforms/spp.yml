  name: службові лахи НоП # PaP - People's armed Police
  description: Пара блакитно-сірих брюк поєднана з блакитною сорочкою, оснащена вставками з венлару у критичних зонах для захисту від колючо-ріжучої зброї та куль малого калібру.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/pap.rsi
  - type: UniformAccessoryHolder
    startingAccessories:
    - RMCPatchSPP
