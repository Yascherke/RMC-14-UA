# Civilians
- type: entity
  parent: RMCUniformBase
  id: CMJumpsuitSPPCiv1
  name: цивільні помаранчеві лахи СПН
  description: Помаранчевий комбінезон з темно-бежевою підсорочкою. Тканина недовговічна, але краще, ніж нічого. Такий одяг зазвичай отримують ті, хто займаються важкою фізичною працею.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ1.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv2
  name: цивільні пісочні лахи СПН
  description: Пісочний комбінезон з блакитною підсорочкою. Тканина недовговічна, але краще, ніж нічого. Такий одяг зазвичай отримують ті, хто займаються важкою фізичною працею.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ2.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv3
  name: цивільні футболка та штані СПН
  description: Комплект цивільного одягу з пісчаної футболки та джинсів. Матеріал, звісно, поганої якості, проте достатньо зручний, щоби носити цілий день.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ3.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv4
  name: цивільні жилетка та штані СПН
  description: Комплект цивільного одягу з коричневої жилетки та помаранчевих штанів. Матеріал на диво гарний - щось, що цивільні СПН не часто носять по двом причинам. Зазвичай, вони не можуть собі дозволити таке вбрання, а якщо й можуть, це робить їх мішенню.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ4.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: RMCJumpsuitSPPCiv5
  name: "шахтарні лахи комбінату Чаньє"
  description: "Міцний оливково-зелений комбінезон, який носять під безрукавним, пухким помаранчевим робочим жилетом — стандартна форма робітників об’єднання комбінат Чаньє. Вицвілий матеріал жилета підбитий посиленими вставками, що забезпечують мінімальний захист від виробничих небезпек. На спині штампована червона зірка, що позначає його носія як частину промислового персоналу комбінату. Жорсткий, незручний і масово виготовлений, але краще, ніж нічого в суворих умовах праці у глибокому космосі."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/civ5.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPBear
  name: Iron Bear uniform
  description: A uniform worn by Iron Bears mercenaries. Smells a little like an actual bear.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/SPP/bear.rsi
