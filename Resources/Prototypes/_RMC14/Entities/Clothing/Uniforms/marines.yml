# CBRN

- type: entity
  parent: RMCMarineUniformBase
  id: RMCCBRNSuit
  name: костюм М3 РБХЗ
  description: Костюми М3 РХБЗ розроблені для захисту від радіологічних, біологічних, хімічних та ядерних загроз (РБХЗ) у польових умовах. Після контакту з токсичним середовищем рекомендується використовувати їх не більше двадцяти чотирьох годин. За високого рівня небезпеки цей час може скоротитися до восьми годин або менше.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/Marine/cbrnsuit.rsi
  - type: CMArmor
    bullet: 10
    melee: 10
    bio: 100
    explosionArmor: 10

