# Warrant Officer / CMP
- type: entity
  parent: RMCMarineUniformBase
  id: CMJumpsuitWO
  name: уніформа голови ВСП
  description: Уніформа, яку, зазвичай, носять голови ВСП КМПОН. Вона містить вставки легкого кевлару, що захищає від колючо-ріжучої зброї, куль та шрапнелі від вибухів. Ця форма оснащена невеликим розподільником ЕМП для нейтралізації вогню енергетичної зброї, а також хімічним фільтром, вплетеним у матеріал, щоб захищати від біологічних та радіаційних загроз.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/MP/wo/jungle.rsi
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Uniforms/MP/wo/jungle.rsi
      Desert: _RMC14/Objects/Clothing/Uniforms/MP/wo/desert.rsi
      Snow: _RMC14/Objects/Clothing/Uniforms/MP/wo/snow.rsi
      Classic: _RMC14/Objects/Clothing/Uniforms/MP/wo/classic.rsi
      Urban: _RMC14/Objects/Clothing/Uniforms/MP/wo/urban.rsi
  - type: Tag
    tags:
    - RMCUniformMarine
    - RMCUniformCMP

