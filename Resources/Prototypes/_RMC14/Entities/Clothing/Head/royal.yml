- type: entity
  parent: RMCHeadRoyalHelmet
  id: RMCHeadRoyalL1HelmetBallistic
  name: L1 ballistic helmet
  description: A versatile ballistic helmet designed by Weston-Yamada for general use across various branches of the TSE military and affiliated organizations. Drawing some design inspiration from the UNMC’s M10 Pattern Helmet, the L1 offers reliable protection against shrapnel and ballistic threats..
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/l1ballistic.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/l1ballistic.rsi

- type: entity
  parent: RMCHeadRoyalHelmet
  id: RMCHeadRoyalFlightHelmet
  name: PH-4 'Spitfire' flight helmet
  description: Standard flight helmet used across the Three Suns Empire’s aerospace forces, from fighter pilots to atmospheric crews. This PH-4 variant is tailored for dropship operations in space, featuring reinforced plating, HUD optics, and encrypted comms. Essential for high-risk insertions, landings, and exfil missions. Nicknamed “Spitfire” for its reliability under fire.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/flighthelmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/flighthelmet.rsi
  - type: CMArmor
    melee: 25
    explosionArmor: 20
    # armor_internaldamage = 30
  - type: CycleableVisor
    containers:
    - rmc_visor_one
    - rmc_visor_two
    - rmc_visor_three
  - type: IntegratedVisors
    visorsToAdd:
    - RMCVisorMedicalAdvancedIntegrated
    - RMCVisorSquadIntegrated
    - RMCVisorPilotBlack
