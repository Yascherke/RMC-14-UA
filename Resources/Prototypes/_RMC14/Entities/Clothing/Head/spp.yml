# SPP helmets
- type: entity
  parent: ArmorHelmetM10
  id: ArmorHelmetSPP
  name: шолом СПН УМ4
  description: Завдяки високотехнологічним методам виробництва, шолом УМ4 відрізняється дуже високим опором до балістичних пошкоджень, проте його велика вага створює значне навантаження на голову користувача, що, найімовірніше, призведе до проблем із шиєю.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/helmet.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    bullet: 30
    bio: 15
    explosionArmor: 20
    # armor_energy = 20
    # armor_rad = 15
    # armor_internaldamage = 30
  - type: RMCEarProtection

- type: entity
  parent: ArmorHelmetSPP
  id: ArmorHelmetSPPEngineer
  name: шолом СПН УМ4-В
  description: Ця версія шолому УМ4 має візор з балістичного скла, дозволяючи інженерам СПП безпечно зварювати, проте дехто звітує про зіпсований зір.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/engi.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/engi.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    melee: 25
    explosionArmor: 30
  - type: CycleableVisor
    containers:
    - rmc_visor_one
    - rmc_visor_two
    - rmc_visor_three
  - type: IntegratedVisors
    visorsToAdd:
    - RMCVisorSquadIntegrated
    - RMCVisorWeldingIntegrated

- type: entity
  parent: ArmorHelmetSPP
  id: ArmorHelmetSPPHeavy
  name: шолом СПН УН7
  description: Наряду з УМ4 цей шолом має високим опором до балістичних пошкоджень, але його плюси й мінуси подвоєно. Кількох сержантів СПН, яким вдалося дожити до 30, було списано через проблеми з шиєю після носіння цього шолому.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/heavy.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/heavy.rsi
  - type: CMArmor
    melee: 25
    bullet: 35
    bio: 20
    explosionArmor: 30
    # armor_internaldamage = 35

- type: entity
  parent: ArmorHelmetSPP
  id: RMCArmorHelmetSPPArmy
  name: бойовий шолом 6Б82
  description: Більш стара версія бойового шолому армії СПН 6Б92, яку досі використовують деякі підрозділи на планетах, які СПН вважає другорядними.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/army_helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/army_helmet.rsi
  - type: ItemCamouflage
    camouflageVariations: { }

- type: entity
  parent: ArmorHelmetSPP
  id: RMCArmorHelmetSPPFirefighter
  name: шолом пожежника Т-20
  description: Зміцнений, вогнестійкий шолом, який видається пожежникам СПН. Його стійка композитна структура захищає від уламків та жару голову, а кожух шию та плечі. Червона зірка нанесена спереду, позначаючи службу в Соціалістичних Прогресивних Народах.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/fire_helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/fire_helmet.rsi
  - type: ItemCamouflage
    camouflageVariations: { }

# SPP hats
- type: entity
  parent: CMHeadCap
  id: CMHeadCapSPP
  name: кепка УЛ2
  description: Головний убір СПН, який видається солдатам, коли не очікується бойових дій.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/cap.rsi

- type: entity
  parent: CMHeadCapSPP
  id: CMHeadCapSPPCivilian
  name: цивільна кепка СПН УЛ2
  description: Цивільний головний убір СПН. Виконано з поганою якістю, через що ніхто не очікує довгої служби, проте, поки воно в одній купі, виглядає стильно.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/civ.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/civ.rsi

- type: entity
  parent: CMHeadCapSPPCivilian
  id: RMCHeadCapSPPCivilianPlantWorker
  name: біла кепка робітника
  description: Проста тканинна кепка, яку часто носять різного роду робітники СПН, щоби не тримати волосся чистим. Легка та практичка, але недовговічна.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/white_cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/white_cap.rsi

- type: entity
  parent: CMHeadCapSPP
  id: CMHeadCapSPPBeret
  name: берет СПН УЛ3
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/beret.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/beret.rsi

- type: entity
  parent: CMHeadCapSPPBeret
  id: RMCHeadCapSPPBeretArmy
  name: берет резервіста СПН
  description: Гарно виконаний берет, який носять резервісти збройних сил СПН. Це символізує їхню незмінну відданість справі, навіть не перебуваючи на дійсній військовій службі, та служить символом єдності та служіння.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/army_beret.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/army_beret.rsi

- type: entity
  parent: CMHeadCapSPP
  id: CMHeadCapSPPPeaked
  name: кашкет СПН УЛ3
  description: Головне вбрання СПН, яке видається капітанам та вище. Виконано з матеріалів високої якості та має золоту позначку офіцера спереду.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/peaked.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/SPP/peaked.rsi

- type: entity
