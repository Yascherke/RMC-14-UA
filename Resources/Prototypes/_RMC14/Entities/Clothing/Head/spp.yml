- type: entity
  parent: CMHeadCapSPP
  id: CMHeadCapSPPUshanka
  name: вушанка СПН УЛ8
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/SPP/ushanka.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
