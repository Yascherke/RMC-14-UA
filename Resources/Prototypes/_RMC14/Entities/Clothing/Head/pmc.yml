# PMC headgear
- type: entity
  parent: ArmorHelmetM10
  id: ArmorHelmetPMC
  name: тактична кепка ПВК
  description: Захисна кепка зроблена з гнучкого кевлару. Стандартна для більшості охоронних організацій замість шолому.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/cap.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    bio: 10
    explosionArmor: 20
    # armor_energy = 15
    # armor_internaldamage = 10

- type: entity
  parent: ArmorHelmetPMC
  id: RMCArmorHelmetPMCBlack
  name: PMC black tactical cap
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/black_cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/black_cap.rsi

- type: entity
  parent: [ArmorHelmetPMC, RMCMarineHelmetWithLightBase]
  id: RMCArmorHelmetPMCTactical
  name: тактичний шолом
  description: Претендент на новий шолом Морської Піхоти Корони, який, наразі, лише проходить польові випробування у найманців Вестон-Ямада. Має балістичну маску та інтегрований дісплей, підключений до візору.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/helmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/helmet.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET
      head-feroxi:
      - state: equipped-HELMET-feroxi
      head-reptilian:
      - state: equipped-HELMET-reptilian
      head-vulpkanin:
      - state: equipped-HELMET-vulpkanin
  - type: CMArmor
    bullet: 25
    bio: 15
    # armor_internaldamage = 15
  - type: HideLayerClothing
    slots:
    - Hair
    - HeadTop
    - HeadSide
    - Snout
    - FacialHair
  - type: PointLight
    color: "#73e6f5"

- type: entity
  parent: ArmorHelmetPMC
  id: ArmorHelmetPMCOfficer
  name: берет ПВК
  description: Вершина моди для кожного прагнучого лідера найманців. Спроєктований захищати голову від легких ударів.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/officer.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/officer.rsi

- type: entity
  parent: ArmorHelmetPMC
  id: ArmorHelmetPMCFieldOfficer
  name: PMC field officer beret
  description: The pinnacle of fashion for any aspiring mercenary leader. Designed to protect the head from light impacts.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/field_officer.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/field_officer.rsi
