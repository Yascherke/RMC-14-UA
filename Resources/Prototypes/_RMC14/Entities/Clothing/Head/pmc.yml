- type: entity
  parent: RMCArmorHelmetPMCTactical
  id: ArmorHelmetPMCGunner
  name: шолом оператора-спеціаліста ПВК
  description: Модифікація стандартного тактичного шолома ПВК, яка має щит спереду для захисту носія від шрапнелі та малокаліберної зброї під час використання важкого озброєння.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/heavy.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/heavy.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET

- type: entity
  parent: RMCArmorHelmetPMCTactical
  id: ArmorHelmetPMCCommando
  name: шолом ПВК М5Х
  description: Повністю закритий, броньований шолом, зроблений для доповнення екзоскелету М5Х.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/PMC/commando.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/PMC/commando.rsi
  - type: CMArmor
    melee: 45
    bullet: 15
    bio: 45
    explosionArmor: 15
    # armor_laser = 15
    # armor_energy = 15
    # armor_internaldamage = 30
  - type: Corrodible
    isCorrodible: false
  - type: ParasiteResistance
    maxCount: 100
  - type: RMCEarProtection
  - type: PointLight
    color: "#e41c1f"

- type: entity
  parent: ArmorHelmetPMCCommando
  id: RMCArmorHelmetPMCCommandoAlt
  suffix: Alt
  description: Повністю закритий, броньований шолом, зроблений для доповнення екзоскелету М5Х. Ця версія має череп вицарапаний на візорі.
  components:
