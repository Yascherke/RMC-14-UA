# CBRN
- type: entity
  parent: ArmorHelmetM10
  id: RMCArmorHelmetCBRN
  name: маска зразка М3 РХБЗ
  description: Маска М3 РХБЗ включає повністю закриваючий капюшон, який надійно приєднується до костюма РБХЗ. Маска фільтрує шкідливі частинки в повітрі, дозволяючи користувачу безпечно дихати в польових умовах. Залежно від рівня забруднення, фільтр маски працює в середньому до 12 годин або менше.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/cbrn.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/cbrn.rsi
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: CMArmor
    melee: 15
    bullet: 15
    bio: 100
    explosionArmor: 20
