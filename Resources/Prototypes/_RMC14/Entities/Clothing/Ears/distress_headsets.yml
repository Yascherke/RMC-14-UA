# For Bureau Marshals
- type: entity
  parent: RMCHeadsetIconsCMB
  id: RMCHeadsetDistressBureau
  name: навушник бюро
  description: Якісно зроблена гарнітура, яку використовують в Бюро Колоніальних Маршалів. Малогабаритна й зручна. Закон один для всіх.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: cmb_headset
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyBureau

# For CMB and ICB survivors.
- type: entity
  parent: RMCHeadsetDistressBureau
  id: RMCHeadsetDistressBureauDamaged
  name: пошкоджений навушник бюро
  description: Якісно зроблена гарнітура, яку використовують в Бюро Колоніальних Маршалів, створена в сонячній системі. Малогабаритна й зручна. Закон один для всіх. Конкретно цей навушник досить пошкоджений і, схоже, деякі частоти відсутні.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyBureauDamaged

