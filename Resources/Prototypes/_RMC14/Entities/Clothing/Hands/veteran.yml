# CBRN
- type: entity
  parent: RMCHandsVeteran
  id: RMCHandsVeteranCBRN
  name: рукавиці М3 РХБЗ
  description: Рукавиці М3 РХБЗ виготовлені з обробленого венлара, призначені для захисту рук користувача від забруднення під час роботи в умовах РХБЗ. Особливу увагу приділено тому, щоб руки користувача зберігали достатню спритність для обслуговування гвинтівки або використання більшості ручних інструментів, а кругові антиковзкі візерунки на пальцях забезпечують покращене зчеплення. Стандартний протокол РХБЗ передбачає, що тривалість максимальної ефективності цих рукавичок становить близько двадцяти чотирьох годин після контакту з помірним рівнем забруднення, після чого користувачам рекомендується їх утилізувати та замінити.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Hands/Gloves/cbrn.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Hands/Gloves/cbrn.rsi
