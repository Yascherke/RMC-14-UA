name: Check Merge Conflicts

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  Label:
    if: ( github.event.pull_request.draft == false ) && ( github.actor != 'PJBot' )
    runs-on: ubuntu-latest
    steps:
      - name: Check for Merge Conflicts
        uses: eps1lon/actions-label-merge-conflict@v3.0.0
        with:
          dirtyLabel: "С: Конфлікт Злиття"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          commentOnDirty: "Цей ПР має конфлікти з мастер гілкою. Виправіть їх, щоб мати можливість замерджити його."
